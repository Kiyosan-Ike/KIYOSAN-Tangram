<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta name="theme-color" content="#24324a">
<meta name="application-name" content="KIYOSAN-Tangram">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KIYOSAN-Tangram">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

<title>KIYOSAN-Tangram Ver.1.91 Prototype 7</title>
<style>
:root{--ink:#23314b;--sub:#68758c;--line:#dce3ee;--blue:#4f7cff;--orange:#ff9f43;--green:#229b63;--bg:#f4f7fb}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;color:var(--ink);background:linear-gradient(180deg,#eaf0ff,#f7f9fc 260px)}
header{position:relative;text-align:center;padding:8px 72px 2px 12px}
.settings-trigger{position:absolute;right:18px;top:8px;min-width:48px;padding:9px 12px;background:rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(35,49,75,.12);border:1px solid rgba(220,227,238,.9)}
h1{margin:0;font-size:clamp(26px,4vw,40px)}
header p{margin:7px 0 0;color:var(--sub)}
.app{width:min(1280px,calc(100% - 20px));margin:4px auto 10px;display:grid;grid-template-columns:330px 1fr;gap:16px}
.card{background:rgba(255,255,255,.97);border-radius:22px;box-shadow:0 14px 36px rgba(35,49,75,.11);padding:12px}
.levels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
button,select{font:inherit}
button{border:0;border-radius:13px;padding:11px 12px;font-weight:700;color:var(--ink);background:#edf1f7;cursor:pointer}
button:active{transform:scale(.98)}
.level.active{background:var(--blue);color:#fff}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
h2{margin:0;font-size:18px}
.badge{font-size:13px;font-weight:700;color:#315fdd;background:#edf2ff;border-radius:999px;padding:6px 10px}
.target{aspect-ratio:1/1;border:2px dashed var(--line);border-radius:18px;overflow:hidden;background:#fbfcff}
svg{width:100%;height:100%;touch-action:none}
.silhouette{fill:var(--silhouette-fill,#6B7FA5);stroke:none}
.target-line{fill:var(--silhouette-fill,#6B7FA5);stroke:none}
.hint-piece{fill:#7585a2;fill-opacity:.15;stroke:#7585a2;stroke-width:1.5;stroke-dasharray:6 5}
.grid-line{stroke:var(--grid-color,#8F9EB7);stroke-width:1.2;vector-effect:non-scaling-stroke;opacity:.75}
.guide-bg{fill:#fff;fill-opacity:.94;stroke:#cbd5e1;stroke-width:2}
.guide-used{stroke:#222;stroke-width:3.5;stroke-linejoin:round}
.guide-unused{fill:none;stroke:#5b6475;stroke-width:3.8;stroke-linejoin:round}
.guide-label{font-size:18px;font-weight:700;fill:#34415a;text-anchor:middle}
.piece{stroke:rgba(35,49,75,.3);stroke-width:1.6;cursor:grab;filter:drop-shadow(0 5px 6px rgba(35,49,75,.18))}
.not-started .piece{cursor:default}
.start-ready{animation:startPulse 1.3s ease-in-out infinite}
@keyframes startPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

.piece:active{cursor:grabbing}.selected{stroke:#111827;stroke-width:3}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.row button{flex:1 1 100px}
.orange{background:var(--orange);color:#fff}.primary{background:var(--blue);color:#fff}.green{background:var(--green);color:#fff}
.help{font-size:12px;color:var(--sub);line-height:1.55;margin:10px 0 0}
.silhouette-setting{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin:0 0 12px;padding:9px 10px;border-radius:12px;background:#f4f6fa;
}
.silhouette-setting label{font-size:13px;font-weight:700;color:var(--ink)}
.silhouette-setting select{
  flex:1;max-width:150px;border:1px solid var(--line);border-radius:10px;
  padding:8px 10px;background:#fff;color:var(--ink);font-weight:700;
}
.utility-buttons{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 12px
}
.utility-buttons button{padding:9px 8px;font-size:13px}
.utility-buttons #clearStarsBtn{grid-column:1/-1;background:#fff3e5;color:#8a4b00}










.problem-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:5px;
  max-height:110px;overflow:auto;margin:0 0 10px;padding:6px;
  border:1px solid var(--line);border-radius:12px;background:#fafbfe
}
.problem-btn{
  position:relative;min-width:0;padding:7px 2px;border-radius:8px;
  font-size:12px;background:#edf1f7
}
.problem-btn.active{background:var(--blue);color:#fff}
.problem-btn.cleared::after{
  content:"★";position:absolute;right:1px;top:-5px;color:#f3b400;
  font-size:13px;text-shadow:0 1px 1px #fff
}
.problem-btn.active.cleared::after{color:#ffe36e;text-shadow:none}


.boardWrap{
  aspect-ratio:10/7;min-height:500px;border:1px solid var(--line);
  border-radius:18px;overflow:hidden;background:#fff;
}
.toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}.toolbar button{flex:1 1 135px}
.status{margin-top:11px;padding:11px 13px;border-radius:13px;background:#f1f4f8;color:var(--sub);font-size:14px}
.status.ok{background:#e8f8ef;color:#157347;font-weight:700}.status.warn{background:#fff3e5;color:#9b5a00;font-weight:700}
.legend{font-size:12px;color:var(--sub);margin-top:8px}
@media(max-width:860px){.app{grid-template-columns:1fr}.side{display:grid;grid-template-columns:minmax(200px,290px) 1fr;gap:14px;align-items:start}.levels,.side>.top{grid-column:1/-1}.row{margin-top:0}}
@media(max-width:590px){.side{display:block}.row{margin-top:11px}.boardWrap{aspect-ratio:1/1.18;min-height:430px}}

.piece-size-panel{margin:0 0 12px;padding:9px 10px;border-radius:12px;background:#f4f6fa}
.piece-size-panel>span{display:block;margin-bottom:7px;font-size:13px;font-weight:700;color:var(--ink)}
.piece-size-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.size-choice{min-height:38px;padding:7px 3px;font-size:13px;border-radius:10px}
.size-choice.selected{background:#9dcfe4!important;color:#274354!important;box-shadow:inset 0 0 0 2px rgba(255,255,255,.8)}

.app-footer{
  width:min(1280px,calc(100% - 20px));margin:0 auto 14px;
  text-align:center;color:var(--sub);font-size:12px;line-height:1.6
}
.app-footer strong{color:var(--ink);font-weight:700}

/* Ver.1.91 Prototype 3：左右の主操作領域の下端をそろえる */
.side{display:flex;flex-direction:column;gap:12px}
.side-section{border:1px solid var(--line);border-radius:16px;background:#fbfcff;padding:11px}
.side-section-title{margin:0 0 9px;font-size:14px;font-weight:800;color:#41506b;letter-spacing:.04em}
.side-section .levels{margin:0}
.side-section .help{margin:8px 0 0}
.problem-section{background:#fff}
.problem-heading{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.problem-heading h2{font-size:18px}
.problem-nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.problem-nav #hint{grid-column:1/-1}
.problem-list-section{background:#fbfcff}
.problem-list-section .problem-grid{max-height:145px;margin:0}
.level-section{background:#fbfcff}
.settings-section{background:#f7f9fc}
.settings-section .silhouette-setting{margin-bottom:8px;background:#fff}
.settings-section .piece-size-panel{margin:0;background:#fff}
.teacher-section{background:#f4f1ff;border-color:#ded7f4}
.teacher-section .utility-buttons{margin:0}
.teacher-section #clearStarsBtn{background:#fff3e5;color:#8a4b00}
.app-footer{white-space:nowrap}
@media(max-width:860px){
  .side{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .side-section{min-width:0}
  .problem-section{grid-column:1/-1}
  .settings-section,.teacher-section{align-self:start}
}
@media(max-width:590px){
  .side{display:flex}
  .app-footer{white-space:normal}
}

/* Prototype 3：主操作カードと補助カードを分離 */
.side-main{display:flex;flex-direction:column;gap:12px;height:100%}
.side-main .level-section{margin-top:auto}
.side-aux{display:flex;flex-direction:column;gap:12px;align-self:start}
.board-card{grid-column:2;grid-row:1}
.side-main{grid-column:1;grid-row:1}
.side-aux{grid-column:1;grid-row:2}
@media(max-width:860px){
  .side-main,.board-card,.side-aux{grid-column:1;grid-row:auto}
  .side-main{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .side-main .problem-section{grid-column:1/-1}
  .side-main .level-section{margin-top:0}
  .side-aux{display:grid;grid-template-columns:1fr 1fr;gap:12px}
}
@media(max-width:590px){
  .side-main,.side-aux{display:flex}
}


/* Ver.1.91 Prototype 4：設定ダイアログ（Prototype 5でも継承） */
body.modal-open{overflow:hidden}
.modal[hidden]{display:none}
.modal{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;padding:20px}
.modal-backdrop{position:absolute;inset:0;background:rgba(22,31,49,.34);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;animation:modalFadeIn .22s ease forwards}
.modal-panel{position:relative;width:min(480px,100%);max-height:min(760px,calc(100vh - 40px));overflow:auto;background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.78);border-radius:24px;box-shadow:0 28px 80px rgba(20,31,52,.28);padding:18px;opacity:0;transform:scale(.96) translateY(8px);animation:modalPanelIn .22s cubic-bezier(.2,.8,.2,1) forwards}
.modal.closing .modal-backdrop{animation:modalFadeOut .18s ease forwards}
.modal.closing .modal-panel{animation:modalPanelOut .18s ease forwards}
@keyframes modalFadeIn{to{opacity:1}}
@keyframes modalFadeOut{from{opacity:1}to{opacity:0}}
@keyframes modalPanelIn{to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes modalPanelOut{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.97) translateY(6px)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.modal-header h2{font-size:21px}
.modal-close{width:38px;height:38px;padding:0;border-radius:999px;font-size:25px;line-height:1;background:#edf1f7;color:#536078}
.modal-section{padding:14px;border:1px solid var(--line);border-radius:16px;background:#f8faff;margin-bottom:12px}
.modal-section h3{margin:0 0 10px;font-size:14px;color:#41506b;letter-spacing:.04em}
.modal-section .silhouette-setting{background:#fff;margin-bottom:8px}
.modal-section .piece-size-panel{background:#fff;margin:0}
.teacher-modal{background:#f6f3ff;border-color:#ded7f4}
.teacher-modal .utility-buttons{margin:0}
.modal-done{width:100%;margin-top:2px}
@media(max-width:590px){header{padding-right:62px}.settings-trigger{right:10px;font-size:0;width:44px;padding:9px}.settings-trigger::first-letter{font-size:20px}.modal{padding:10px}.modal-panel{max-height:calc(100vh - 20px);border-radius:20px}}



/* Ver.1.91 Prototype 5：全画面中央配置とクロスプラットフォーム調整 */
html{min-height:100%;background:#f7f9fc}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button,select{line-height:1.25}
button{min-height:42px;-webkit-tap-highlight-color:transparent}
select{min-height:40px}
.app-footer{font-size:11.5px;line-height:1.45;white-space:nowrap;overflow-wrap:normal}

/* Fullscreen APIでhtml要素が全画面になった場合だけ中央寄せする */
html:fullscreen body,
html:-webkit-full-screen body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  overflow:auto;
}
html:fullscreen header,
html:fullscreen .app,
html:fullscreen .app-footer,
html:-webkit-full-screen header,
html:-webkit-full-screen .app,
html:-webkit-full-screen .app-footer{flex:0 0 auto}

/* 高さの小さいWindowsノートなどでは、上端が切れないよう上寄せに戻す */
@media (max-height:820px){
  html:fullscreen body,
  html:-webkit-full-screen body{justify-content:flex-start}
}
@media(max-width:980px){
  .app-footer{white-space:normal;padding:0 8px}
}
@media(max-width:590px){
  button{min-height:44px}
}


/* Ver.1.91 Prototype 6：iPad・Apple Pencilの盤面操作を固定 */
html,body{overscroll-behavior:none}
body{touch-action:pan-x pan-y}
.boardWrap,#board,#pieceLayer,.piece{
  touch-action:none!important;
  -ms-touch-action:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
body.board-interacting{
  overflow:hidden!important;
  overscroll-behavior:none;
}
body.board-interacting .boardWrap{cursor:grabbing}
@supports (-webkit-touch-callout:none){
  html:fullscreen body,html:-webkit-full-screen body{overscroll-behavior:none}
}



/* Ver.1.91 Prototype 7：iPadファースト固定レイアウト */
body.ipad-mode{
  position:fixed;
  inset:0;
  width:100%;
  height:var(--app-height,100dvh);
  min-height:0;
  overflow:hidden;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  overscroll-behavior:none;
}
body.ipad-mode header{
  padding:6px 72px 0 12px;
  min-height:48px;
}
body.ipad-mode h1{font-size:clamp(25px,3.2vw,36px)}
body.ipad-mode .settings-trigger{
  position:fixed;
  z-index:900;
  top:max(8px,env(safe-area-inset-top));
  right:max(12px,env(safe-area-inset-right));
}
body.ipad-mode .app{
  width:min(1280px,calc(100% - 16px));
  height:100%;
  min-height:0;
  margin:2px auto 6px;
  grid-template-columns:clamp(255px,27vw,330px) minmax(0,1fr);
  grid-template-rows:minmax(0,1fr);
  gap:12px;
  overflow:hidden;
}
body.ipad-mode .side-main,
body.ipad-mode .board-card{
  grid-row:1;
  min-height:0;
  height:100%;
}
body.ipad-mode .side-main{
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:hidden;
}
body.ipad-mode .side-section{padding:8px;border-radius:14px}
body.ipad-mode .problem-section{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
body.ipad-mode .problem-heading{margin-bottom:6px}
body.ipad-mode .target{flex:1 1 auto;min-height:150px;aspect-ratio:auto}
body.ipad-mode .problem-nav{margin-top:7px;gap:6px}
body.ipad-mode .problem-nav button{min-height:38px;padding:8px 9px}
body.ipad-mode .problem-list-section{flex:0 0 auto}
body.ipad-mode .problem-list-section .problem-grid{max-height:96px}
body.ipad-mode .level-section{flex:0 0 auto;margin-top:0}
body.ipad-mode .levels{gap:6px}
body.ipad-mode .level{min-height:36px;padding:7px 8px}
body.ipad-mode .side-section .help{margin-top:5px;line-height:1.35}
body.ipad-mode .board-card{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
body.ipad-mode .board-card>.top{flex:0 0 auto;margin-bottom:6px}
body.ipad-mode .boardWrap{
  flex:1 1 auto;
  min-height:0;
  height:auto;
  aspect-ratio:auto;
}
body.ipad-mode .toolbar{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:6px;
  margin-top:7px;
}
body.ipad-mode .toolbar button{min-height:38px;padding:7px 6px;font-size:13px}
body.ipad-mode .status{flex:0 0 auto;margin-top:7px;padding:8px 10px;font-size:12.5px}
body.ipad-mode .app-footer{
  width:100%;
  margin:0;
  padding:2px 10px max(5px,env(safe-area-inset-bottom));
  font-size:10.5px;
  line-height:1.25;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
body.ipad-mode.modal-open{overflow:hidden}
body.ipad-mode .modal-panel{max-height:calc(var(--app-height,100dvh) - 24px)}

/* iPadの縦向きでも左右2カラムを維持し、盤面を優先する */
@media (max-width:820px){
  body.ipad-mode .app{grid-template-columns:250px minmax(0,1fr);gap:8px}
  body.ipad-mode .card{padding:8px;border-radius:16px}
  body.ipad-mode .side-main{gap:6px}
  body.ipad-mode .problem-list-section .problem-grid{grid-template-columns:repeat(6,1fr);max-height:82px}
  body.ipad-mode .toolbar{grid-template-columns:repeat(2,minmax(0,1fr))}
  body.ipad-mode .toolbar button{font-size:12px}
  body.ipad-mode .app-footer{font-size:9.5px}
}

/* 高さが小さい場合は説明文を省き、操作領域を確保する */
@media (max-height:760px){
  body.ipad-mode .side-section .help{display:none}
  body.ipad-mode .problem-list-section .problem-grid{max-height:72px}
  body.ipad-mode .toolbar button{min-height:34px;padding:5px 5px}
  body.ipad-mode .status{padding:6px 9px}
}

</style>
</head>
<body>
<header><h1>KIYOSAN-Tangram</h1><button id="settingsBtn" class="settings-trigger" type="button" aria-haspopup="dialog" aria-controls="settingsDialog" aria-label="設定を開く">⚙ 設定</button></header>
<main class="app">
<section class="card side side-main">
  <section class="side-section problem-section" aria-labelledby="problemSectionTitle">
    <div class="problem-heading">
      <h2 id="title">入門 1</h2>
      <span class="badge" id="count">1 / 48</span>
    </div>
    <div class="target"><svg viewBox="0 0 320 320"><g id="targetLayer"></g></svg></div>
    <div class="problem-nav">
      <button id="prev">← まえ</button>
      <button id="next">つぎ →</button>
      <button id="hint" class="orange">💡 ヒント</button>
    </div>
  </section>

  <section class="side-section problem-list-section" aria-labelledby="problemListSectionTitle">
    <h2 class="side-section-title" id="problemListSectionTitle">問題一覧</h2>
    <div id="problemGrid" class="problem-grid"></div>
    <p class="help">クリアした問題には★が付きます。</p>
  </section>

  <section class="side-section level-section" aria-labelledby="levelSectionTitle">
    <h2 class="side-section-title" id="levelSectionTitle">レベル</h2>
    <div class="levels" id="levels"></div>
    <p class="help">レベルを選び、お手本と同じ形をつくりましょう。</p>
  </section>

</section>
<section class="card board-card">
  <div class="top"><h2>組み立てる場所</h2><span class="legend"></span></div>
  <div class="boardWrap">
    <svg id="board" viewBox="0 0 1000 700">
      <g id="gridLayer"></g>
      <g id="hintLayer"></g>
      <g id="guideLayer"></g>
      <g id="pieceLayer"></g>
    </svg>
  </div>
  <div class="toolbar">
    <button id="left">↶ 左へ45°</button><button id="right">↷ 右へ45°</button>
    <button id="flip">↔ 裏返す</button><button id="front">⬆ 最前面</button>
    <button id="oneHint" class="orange">1ピースヒント</button>
    <button id="check" class="green">✓ 完成チェック</button>
    <button id="startBtn" class="green">▶ はじめる</button>
    <button id="reset" class="primary">はじめにもどす</button>
  </div>
  <div id="status" class="status">頂点のすぐ近くをつかむと回転し、それ以外の場所をつかむと移動します。</div>
</section>


</main>
<div id="settingsDialog" class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsDialogTitle" hidden>
  <div class="modal-backdrop" data-close-settings></div>
  <div class="modal-panel" tabindex="-1">
    <div class="modal-header">
      <h2 id="settingsDialogTitle">⚙ 設定</h2>
      <button id="closeSettingsBtn" class="modal-close" type="button" aria-label="設定を閉じる">×</button>
    </div>
    <section class="modal-section" aria-labelledby="appearanceTitle">
      <h3 id="appearanceTitle">表示</h3>
      <div class="silhouette-setting">
        <label for="silhouetteColor">問題の色</label>
        <select id="silhouetteColor">
          <option value="bluegray">青灰色</option>
          <option value="cream">クリーム</option>
          <option value="beige">ベージュ</option>
        </select>
      </div>
      <div class="silhouette-setting">
        <label for="gridColor">方眼の色</label>
        <select id="gridColor">
          <option value="bluegray">青灰色</option>
          <option value="green">緑</option>
          <option value="beige">ベージュ</option>
        </select>
      </div>
      <div class="piece-size-panel">
        <span>ピースの大きさ</span>
        <div class="piece-size-buttons">
          <button type="button" data-piece-size="1" class="size-choice">標準</button>
          <button type="button" data-piece-size="1.3" class="size-choice">大</button>
          <button type="button" data-piece-size="1.5" class="size-choice">特大</button>
        </div>
      </div>
    </section>
    <section class="modal-section teacher-modal" aria-labelledby="teacherTitle">
      <h3 id="teacherTitle">教師用</h3>

function centroid(pts){return {x:pts.reduce((a,p)=>a+p[0],0)/pts.length,y:pts.reduce((a,p)=>a+p[1],0)/pts.length}}
function tf(el,p){

function localToBoard(id,pt){
  const q=state[id],rad=q.r*Math.PI/180;
  const x=pt[0]*q.s*q.f,y=pt[1]*q.s;
  return {x:q.x+x*Math.cos(rad)-y*Math.sin(rad),y:q.y+x*Math.sin(rad)+y*Math.cos(rad)};
}
function transformedVertices(id){
  return SHAPES[id].map(v=>localToBoard(id,v));
}
function edgeAngle(a,b){
  return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;
}
function snapToOtherPiece(id){
  const moving=state[id];
  const mv=transformedVertices(id);
  let best=null;

  for(const [otherId,other] of Object.entries(state)){
    if(otherId===id)continue;
    const ov=transformedVertices(otherId);

    // まず辺同士の吸着を探す
    for(let i=0;i<mv.length;i++){
      const a=mv[i],b=mv[(i+1)%mv.length];
      const len1=Math.hypot(b.x-a.x,b.y-a.y);
      const ang1=edgeAngle(a,b);

      for(let j=0;j<ov.length;j++){
        const c=ov[j],d=ov[(j+1)%ov.length];
        const len2=Math.hypot(d.x-c.x,d.y-c.y);
        if(Math.abs(len1-len2)>18)continue;

        const ang2=edgeAngle(c,d);
        const parallel=Math.min(angleDiff(ang1,ang2),angleDiff(ang1,ang2+180));
        if(parallel>10)continue;

        // 逆向きに重ねる（辺同士が接する）
        const dx1=d.x-a.x,dy1=d.y-a.y;
        const dx2=c.x-b.x,dy2=c.y-b.y;
        const score=Math.hypot(dx1,dy1)+Math.hypot(dx2,dy2);

        if(score<90 && (!best || score<best.score)){
          best={score,dx:(dx1+dx2)/2,dy:(dy1+dy2)/2,type:"edge"};
        }
      }
    }

    // 頂点同士の吸着
    for(const a of mv){
      for(const b of ov){
        const dist=Math.hypot(b.x-a.x,b.y-a.y);
        if(dist<34 && (!best || dist<best.score)){
          best={score:dist,dx:b.x-a.x,dy:b.y-a.y,type:"vertex"};
        }
      }
    }
  }

  if(best){
    moving.x+=best.dx;
    moving.y+=best.dy;
    tf(moving.el,moving);
    status.className="status";
    status.textContent=best.type==="edge"
      ?"ピースの辺がぴったり合いました。"
      :"ピースの頂点がぴったり合いました。";
    return true;
  }
  return false;
}
function snapToGrid(id){
  const q=state[id];
  const grid=25;
  const verts=transformedVertices(id);

  let best=null;
  for(const v of verts){
    const gx=Math.round(v.x/grid)*grid;
    const gy=Math.round(v.y/grid)*grid;
    const dx=gx-v.x;
    const dy=gy-v.y;
    const dist=Math.hypot(dx,dy);

    if(!best || dist<best.dist){
      best={dx,dy,dist};
    }
  }

  if(best){
    q.x+=best.dx;
    q.y+=best.dy;
  }

  tf(q.el,q);
  status.className="status";
  status.textContent="頂点が方眼の交点に吸着しました。";
}
function smartSnap(id){
  const q=state[id];
  const before={x:q.x,y:q.y,r:q.r,f:q.f};

  // 正解位置への吸着が最優先
  snap(id);
  if(q.x!==before.x || q.y!==before.y || q.r!==before.r || q.f!==before.f)return;

  // 次にほかのピースの辺・頂点へ吸着
  if(snapToOtherPiece(id))return;

  // 最後に格子点へ吸着
  snapToGrid(id);
}
function posePoint(q,pt){
  const rad=q.r*Math.PI/180;
  const x=pt[0]*q.s*q.f,y=pt[1]*q.s;
  return {x:q.x+x*Math.cos(rad)-y*Math.sin(rad),y:q.y+x*Math.sin(rad)+y*Math.cos(rad)};
}
function centerDistance(q){
  const a=posePoint(q,[q.c.x,q.c.y]);
  const t={...q.target,c:q.c};
  const b=posePoint(t,[q.c.x,q.c.y]);
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function playCompleteSound(){
  try{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    const ctx=new AudioCtx();
    const notes=[523.25,659.25,783.99];
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type="sine";
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,ctx.currentTime+i*.12);
      gain.gain.linearRampToValueAtTime(.16,ctx.currentTime+i*.12+.02);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.28);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*.12);
      osc.stop(ctx.currentTime+i*.12+.3);
    });
    setTimeout(()=>ctx.close(),900);
  }catch(e){}
}

  status.className="status";
  status.textContent="ピースが広がっています。";

  ALL_IDS.forEach((id,i)=>{
    const q=state[id];
    if(!q)return;
    const sx=q.x,sy=q.y,sr=q.r;
    const tx=targets[i][0],ty=targets[i][1],tr=rotations[i];
    const delay=i*70,duration=720;
    const begin=performance.now()+delay;

    function frame(now){
      if(now<begin){requestAnimationFrame(frame);return;}
      const t=Math.min(1,(now-begin)/duration);
      const e=1-Math.pow(1-t,3);
      q.x=sx+(tx-sx)*e;
      q.y=sy+(ty-sy)*e;
      q.r=sr+(tr-sr)*e;
      tf(q.el,q);
      if(t<1){
        requestAnimationFrame(frame);
      }else{
        q.x=tx;q.y=ty;q.r=tr;tf(q.el,q);
        if(i===ALL_IDS.length-1){
          scatterAnimating=false;
          document.getElementById("startBtn").textContent="↻ もう一度";
          status.className="status";
          status.textContent=`7つのピースから、右上の太線で示した${current().used.length}つを使います。`;
        }
      }
    }
    requestAnimationFrame(frame);
  });
}
function restartScatter(){

  setTimeout(scatterPieces,180);

function animateToSolution(){
  const preferredOrder=["L1","L2","M","P","SQ","S1","S2"];
  const p=current();
  const used=preferredOrder.filter(id=>p.used.includes(id));
  const duration=760;
  const delayStep=620;

  status.className="status";
  status.textContent="答えを1枚ずつ組み立てています。";

  used.forEach((id,i)=>{
    const q=state[id];
    if(!q||!q.target)return;

    const start={x:q.x,y:q.y,r:q.r,f:q.f};
    const end={x:q.target.x,y:q.target.y,r:q.target.r,f:q.target.f};
    const startTime=performance.now()+i*delayStep;

    function step(now){
      if(now<startTime){
        requestAnimationFrame(step);
        return;
      }

      const t=Math.min(1,(now-startTime)/duration);
      const ease=t<0.5
        ? 4*t*t*t
        : 1-Math.pow(-2*t+2,3)/2;

      q.x=start.x+(end.x-start.x)*ease;
      q.y=start.y+(end.y-start.y)*ease;

      let dr=((end.r-start.r+540)%360)-180;
      q.r=start.r+dr*ease;

      if(t>.58) q.f=end.f;

      tf(q.el,q);

      if(t<1){
        requestAnimationFrame(step);
      }else{
        q.x=end.x;
        q.y=end.y;
        q.r=end.r;
        q.f=end.f;
        tf(q.el,q);

        // 1枚ごとに軽く吸い付く演出
        const anim=document.createElementNS(NS,"animateTransform");
        anim.setAttribute("attributeName","transform");
        anim.setAttribute("type","translate");
        anim.setAttribute("additive","sum");
        anim.setAttribute("dur","0.22s");
        anim.setAttribute("values","0 0; 0 -5; 0 0");
        anim.setAttribute("keyTimes","0;0.5;1");
        anim.setAttribute("fill","remove");
        q.el.appendChild(anim);
        anim.beginElement();
        setTimeout(()=>anim.remove(),300);

        if(i===used.length-1){
          status.className="status ok";
          status.textContent="答えの形が完成しました。";
          setTimeout(()=>celebrate(),180);
        }
      }
    }
    requestAnimationFrame(step);
  });
}

 });

function point(e){const pt=board.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;return pt.matrixTransform(board.getScreenCTM().inverse())}
function setBoardInteractionLock(on){
 document.body.classList.toggle("board-interacting",on);
}
function endBoardInteraction(){

}
function startDrag(e,id){
 e.preventDefault();
 if(!started||scatterAnimating)return;
 setBoardInteractionLock(true);
 select(id);
 const p=point(e),q=state[id];
 const verts=SHAPES[id].map(v=>localToBoard(id,v));
 const nearest=Math.min(...verts.map(v=>Math.hypot(p.x-v.x,p.y-v.y)));
 const center=localToBoard(id,[q.c.x,q.c.y]);

 // 頂点の近くをつかんだときだけ回転。それ以外は移動。
 if(nearest<14){
   drag={
     id,
     mode:"rotate",
     cx:center.x,
     cy:center.y,
     startAngle:Math.atan2(p.y-center.y,p.x-center.x)*180/Math.PI,
     startR:q.r
   };
   status.className="status";
   status.textContent="頂点をドラッグして回転しています。";
 }else{
   drag={id,mode:"move",dx:p.x-q.x,dy:p.y-q.y};
   status.className="status";
   status.textContent="ピースを移動しています。";
 }
 q.el.setPointerCapture(e.pointerId);
}
board.addEventListener("pointermove",e=>{
 if(!drag)return;
 e.preventDefault();
 const p=point(e),q=state[drag.id];
 if(drag.mode==="move"){
   q.x=p.x-drag.dx;q.y=p.y-drag.dy;
 }else{
   const a=Math.atan2(p.y-drag.cy,p.x-drag.cx)*180/Math.PI;
   q.r=(drag.startR+(a-drag.startAngle)+360)%360;
   const rad=q.r*Math.PI/180;
   const lx=q.c.x*q.s*q.f,ly=q.c.y*q.s;
   q.x=drag.cx-(lx*Math.cos(rad)-ly*Math.sin(rad));
   q.y=drag.cy-(lx*Math.sin(rad)+ly*Math.cos(rad));
 }
 tf(q.el,q);
},{passive:false});
board.addEventListener("pointerup",()=>{
 if(drag){
   const q=state[drag.id];
   if(drag.mode==="rotate"){
     q.r=Math.round(q.r/45)*45%360;
     const rad=q.r*Math.PI/180;
     const lx=q.c.x*q.s*q.f,ly=q.c.y*q.s;
     q.x=drag.cx-(lx*Math.cos(rad)-ly*Math.sin(rad));
     q.y=drag.cy-(lx*Math.sin(rad)+ly*Math.cos(rad));
   }
   tf(q.el,q);
   smartSnap(drag.id);
   drag=null;
 }
 endBoardInteraction();
});
board.addEventListener("pointercancel",e=>{
  drag=null;
  endBoardInteraction();
  touchPoints.delete(e.pointerId);
  if(touchPoints.size<2)gesture=null;
});
board.addEventListener("pointerdown",e=>{
  if(e.pointerType==="touch"){
    e.preventDefault();
    setBoardInteractionLock(true);
    const id=e.target?.dataset?.id||selected;
    touchPoints.set(e.pointerId,{x:e.clientX,y:e.clientY,id});
    if(touchPoints.size===2)beginGesture();
  }
},{passive:false});
board.addEventListener("pointermove",e=>{
  if(e.pointerType!=="touch"||!touchPoints.has(e.pointerId))return;
  const old=touchPoints.get(e.pointerId);
  touchPoints.set(e.pointerId,{...old,x:e.clientX,y:e.clientY});
  if(gesture&&touchPoints.size===2){
    e.preventDefault();
    const pts=[...touchPoints.values()];
    const q=state[gesture.id];
    const a=angleBetween(pts[0],pts[1]);
    q.r=(gesture.startR+(a-gesture.startAngle)+360)%360;
    tf(q.el,q);
  }
},{passive:false});
board.addEventListener("pointerup",e=>{
  if(e.pointerType==="touch"){
    touchPoints.delete(e.pointerId);
    if(gesture&&touchPoints.size<2){
      const q=state[gesture.id];
      q.r=Math.round(q.r/45)*45%360;
      tf(q.el,q);
      smartSnap(gesture.id);
      gesture=null;
    }
    if(touchPoints.size===0&&!drag)endBoardInteraction();
  }
});

function check(){
 // 同じ形のピース（大三角形2枚・小三角形2枚）は、
 // どちらをどこへ置いても正解になるように判定する。
 const groups=[["L1","L2"],["S1","S2"],["M"],["SQ"],["P"]];
 let distances=[];

 for(const group of groups){
   const ids=group.filter(id=>state[id]&&state[id].target);
   if(!ids.length)continue;

   const actual=ids.map(id=>posePoint(state[id],[state[id].c.x,state[id].c.y]));
   const targets=ids.map(id=>{
     const q=state[id];
     const t={...q.target,c:q.c};
     return posePoint(t,[q.c.x,q.c.y]);
   });

   if(ids.length===2){
     const d00=Math.hypot(actual[0].x-targets[0].x,actual[0].y-targets[0].y);
     const d11=Math.hypot(actual[1].x-targets[1].x,actual[1].y-targets[1].y);
     const d01=Math.hypot(actual[0].x-targets[1].x,actual[0].y-targets[1].y);
     const d10=Math.hypot(actual[1].x-targets[0].x,actual[1].y-targets[0].y);
     if(d00+d11<=d01+d10)distances.push(d00,d11);
     else distances.push(d01,d10);
   }else{
     distances.push(Math.hypot(actual[0].x-targets[0].x,actual[0].y-targets[0].y));
   }
 }

 // かなり大まかな判定。ほぼ同じ場所にまとまっていれば完成。
 const good=distances.filter(d=>d<185).length;
 const average=distances.reduce((a,b)=>a+b,0)/Math.max(1,distances.length);
 // かなり緩やかな判定：半数以上が近く、全体も大きく外れていなければ完成
 const ok=good>=Math.ceil(distances.length*.6) && average<165;

 status.className=ok?"status ok":"status warn";
 status.textContent=ok
   ?"完成です！ だいたい同じ形にできています。"
   :"もう少しです。大きく離れているピースを直してみましょう。";
 if(ok){ markCleared(); celebrate(); playCompleteSound(); }
}

 });
 if(!ids.length)return check();
